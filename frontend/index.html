<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Onboarding</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: sans-serif; background: #f4f6f8; color: #333; }
      nav { background: #1a73e8; padding: 12px 24px; display: flex; gap: 20px; }
      nav a { color: white; text-decoration: none; font-weight: bold; }
      .container { max-width: 900px; margin: 30px auto; padding: 0 16px; }
      table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
      th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eee; }
      th { background: #f0f4ff; }
      form { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
      input, select { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
      button { padding: 8px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
      .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
      .pending { background: #fff3cd; color: #856404; }
      .approved { background: #d4edda; color: #155724; }
      .rejected { background: #f8d7da; color: #721c24; }
      .onboarding { background: #cce5ff; color: #004085; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
