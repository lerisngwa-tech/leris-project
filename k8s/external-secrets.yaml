apiVersion: v1
kind: Namespace
metadata:
  name: onboarding
  annotations:
    # Namespace is cluster-scoped; github-actions-role's EKS access entry is
    # deliberately scoped to namespace-level edit only, so it can't patch a
    # cluster-scoped object at all. If ArgoCD ever syncs this object it adds
    # a tracking-id annotation, which then makes the *next* CD apply try to
    # patch that annotation away and get a 403. Excluding it from ArgoCD's
    # sync keeps this object untouched by anything but CD/cluster admins.
    argocd.argoproj.io/sync-options: Exclude=true
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secret-store
  namespace: onboarding
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: onboarding
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::246312965731:role/external-secrets-role
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-secret
  namespace: onboarding
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secret-store
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: onboarding/db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: onboarding/db-credentials
        property: password
    - secretKey: host
      remoteRef:
        key: onboarding/db-credentials
        property: host
    - secretKey: dbname
      remoteRef:
        key: onboarding/db-credentials
        property: dbname
