# Applied manually by a cluster admin (kubectl apply -f k8s/bootstrap/rbac.yaml),
# not by CD - the deploying role must not be able to grant itself RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: external-secrets-deployer
  namespace: onboarding
rules:
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores", "externalsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-deployers-external-secrets
  namespace: onboarding
subjects:
  - kind: Group
    name: github-actions-deployers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: external-secrets-deployer
  apiGroup: rbac.authorization.k8s.io
