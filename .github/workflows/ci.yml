name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  # ── Backend lint + audit ───────────────────────────────────────────────────
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: backend

  # ── Frontend lint + audit ──────────────────────────────────────────────────
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: frontend

  # ── IaC security scan (Checkov) ────────────────────────────────────────────
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov Terraform scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          output_format: cli

      - name: Checkov K8s scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s
          framework: kubernetes
          soft_fail: true
          output_format: cli

  # ── Container image scan (Trivy) ───────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t onboarding-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t onboarding-frontend:${{ github.sha }} ./frontend

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: onboarding-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: onboarding-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Secret detection (Gitleaks) ────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
