name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Backend audit ──────────────────────────────────────────────────────────
  backend-checks:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package.json

      - run: npm install
        working-directory: backend

      - run: npm audit --audit-level=high
        working-directory: backend

  # ── Frontend audit ─────────────────────────────────────────────────────────
  frontend-checks:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - run: npm install
        working-directory: frontend

      - run: npm audit --audit-level=high
        working-directory: frontend

  # ── IaC scan (Checkov) ─────────────────────────────────────────────────────
  iac-scan:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4

      - name: Checkov Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          output_format: cli
          config_file: .checkov.ini

      - name: Checkov K8s
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s
          framework: kubernetes
          soft_fail: true
          output_format: cli

  # ── Image scan (Trivy) ─────────────────────────────────────────────────────
  image-scan:
    runs-on: ubuntu-latest
    environment: ci
    needs: [backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: docker build -t onboarding-backend:${{ github.sha }} ./backend

      - name: Build frontend
        run: docker build -t onboarding-frontend:${{ github.sha }} ./frontend

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: onboarding-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Trivy scan frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: onboarding-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── Secret detection (Gitleaks) ────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
