name: CD

on:
  push:
    branches: [main]

jobs:
  # ── Build & push to ECR ────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          docker build -t ${{ vars.ECR_BACKEND }}:${{ github.sha }} ./backend
          docker push ${{ vars.ECR_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        run: |
          docker build -t ${{ vars.ECR_FRONTEND }}:${{ github.sha }} ./frontend
          docker push ${{ vars.ECR_FRONTEND }}:${{ github.sha }}

      - name: ECR scan gate
        run: |
          sleep 30
          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name onboarding-backend \
            --image-id imageTag=${{ github.sha }} \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text 2>/dev/null || echo "0")
          if [ "$FINDINGS" != "None" ] && [ "$FINDINGS" -gt 0 ]; then
            echo "CRITICAL vulnerabilities found: $FINDINGS"
            exit 1
          fi

  # ── Deploy to staging ──────────────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER }}

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/external-secrets.yaml
          kubectl apply -f k8s/

      - name: Deploy to staging
        run: |
          kubectl set image deployment/backend backend=${{ vars.ECR_BACKEND }}:${{ needs.build.outputs.image_tag }} -n onboarding
          kubectl set image deployment/frontend frontend=${{ vars.ECR_FRONTEND }}:${{ needs.build.outputs.image_tag }} -n onboarding
          kubectl rollout status deployment/backend -n onboarding --timeout=120s
          kubectl rollout status deployment/frontend -n onboarding --timeout=120s

      - name: Rollback staging on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/backend -n onboarding
          kubectl rollout undo deployment/frontend -n onboarding

  # ── Deploy to production (requires manual approval) ───────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    needs: [build, deploy-staging]
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ vars.EKS_CLUSTER }}

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/external-secrets.yaml
          kubectl apply -f k8s/

      - name: Deploy to production
        run: |
          kubectl set image deployment/backend backend=${{ vars.ECR_BACKEND }}:${{ needs.build.outputs.image_tag }} -n onboarding
          kubectl set image deployment/frontend frontend=${{ vars.ECR_FRONTEND }}:${{ needs.build.outputs.image_tag }} -n onboarding
          kubectl rollout status deployment/backend -n onboarding --timeout=120s
          kubectl rollout status deployment/frontend -n onboarding --timeout=120s

      - name: Rollback production on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/backend -n onboarding
          kubectl rollout undo deployment/frontend -n onboarding
